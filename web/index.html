<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tesserae Studio</title>
    <!-- Reuse Tesserae's admin design system verbatim so Studio reads as part
         of the same product: base.css carries the tokens + Inter/JetBrains Mono
         @font-face + element base, forms.css styles .field controls. Served
         same-origin from the disk checkout (or proxied from a live instance).
         Phosphor weights are linked at the document level so ph-* glyphs paint
         inside the widgets' shadow roots, exactly as templates/_base.html does. -->
    <link rel="stylesheet" href="/static/style/base.css" />
    <link rel="stylesheet" href="/static/style/forms.css" />
    <!-- Spectra widget tokens + typographic style axis, linked at the document
         level exactly as templates/compose.html does. These define --surface,
         --text-primary, --accent-1..6, etc. on :root (light theme by default);
         CSS custom properties inherit through the shadow boundary, so every
         previewed widget is themed. Without these the widgets render un-themed
         (plain black on white). -->
    <link rel="stylesheet" href="/static/style/spectra-tokens.css" />
    <link rel="stylesheet" href="/static/style/spectra-styles.css" />
    <link rel="stylesheet" href="/static/icons/phosphor/regular/style.css" />
    <link rel="stylesheet" href="/static/icons/phosphor/bold/style.css" />
    <link rel="stylesheet" href="/static/icons/phosphor/fill/style.css" />
    <link rel="stylesheet" href="/static/icons/phosphor/duotone/style.css" />
  </head>
  <body class="admin">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
